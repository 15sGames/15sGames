<!DOCTYPE html>
<html>
<head>
    <title>15's Game Library</title>
  <style>
    body {
        background-color: #333;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
    }
    h1 {
      animation: colorChange 0.5s infinite;
      text-align: center;
      
      transform: translateY(20px);

      -webkit-text-stroke: 2px black;
      font-size: 50px;
    }

    @keyframes colorChange {
      0%   { color: red; }
      25%  { color: blue; }
      50%  { color: green; }
      75%  { color: orange; }
      100% { color: red; }
    }
  </style>
</head>
<body>
  <h1>15's Game Library</h1>
  <hr style="margin-top: 50px;">

  <div class="parent">
  <button>Games</button>
  <button>Shows</button>
</div>

<style>
  .parent {
    display: flex;
    justify-content: center;  
    gap: 10px;                
  }
</style>
  <hr>
    <a href="/fvm/" class="button">Family Guy vs. American Dad</a>
</body>
</html>
