<!DOCTYPE html>
<html>
<head>
    <title>15's Game Library</title>
    <style>
        body {
            background-color: #333;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            animation: colorChange 0.5s infinite;
            text-align: center;
            transform: translateY(20px);
            -webkit-text-stroke: 2px black;
            font-size: 50px;
        }

        @keyframes colorChange {
            0%   { color: red; }
            25%  { color: blue; }
            50%  { color: green; }
            75%  { color: orange; }
            100% { color: red; }
        }

        .parent {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* RED BOX STYLE */
        .button-box-wrapper {
            text-align: center;
        }

        .button-box {
            background-color: red;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            margin: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        .button-box:hover {
            transform: scale(1.05);
        }

        .button {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>15's Game Library</h1>
    <hr style="margin-top: 50px;">

    <div class="parent">
        <button>Games</button>
        <button>Shows</button>
    </div>

    <hr>

    <!-- FIRST GAME -->
    <div class="button-box-wrapper">
        <div class="button-box">
            <a href="/15sGames/fvm/" class="button">
                Family Guy vs. American Dad
            </a>
        </div>
    </div>

    <!-- SECOND GAME -->
    <div class="button-box-wrapper">
        <div class="button-box">
            <a href="/Farafalla/" class="button">
                Farafalla
            </a>
        </div>
    </div>

</body>
</html>
