<!DOCTYPE html>
<html>
<head>
    <title>15's Game Library</title>
    
    <style>
        body {
            background-color: #333;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            animation: colorChange 0.5s infinite;
            text-align: center;
            transform: translateY(20px);
            -webkit-text-stroke: 2px black;
            font-size: 50px;
        }

        @keyframes colorChange {
            0%   { color: red; }
            25%  { color: blue; }
            50%  { color: green; }
            75%  { color: orange; }
            100% { color: red; }
        }

        .parent {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .list-box-wrapper {
            text-align: center;
        }

        .list-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .list-box {
            background-color: #008FC9;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            margin: 20px;
            text-align: left;
            width: 300px;
        }

        /* NEW lavender box */
        .list-box.lavender {
            background-color: #C8A2C8;
        }

        .list-title {
            font-weight: bold;
            color: black;
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .game-list a {
            display: block;
            text-decoration: none;
            color: white;
            margin: 5px 0;
            font-size: 16px;
            text-align: center;
        }

        .game-list a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>15's Game Library</h1>
    <h4>Still in development</h4>
    <hr style="margin-top: 50px;">

    <div class="parent">
        <button>Games</button>
        <button>Shows</button>
    </div>

    <hr>

    <div class="list-box-wrapper">
        <div class="list-container">
            
            <!-- ORIGINAL LIST -->
            <div class="list-box">
                <div class="list-title">15's Favorites</div>
                <div class="game-list">
                    <a href="/15sGames/fvm/">Family Guy vs. American Dad</a>
                    <a href="/15sGames/Farafalla/">Farafalla</a>
                    <a href="/15sGames/PacXon/">Pac Xon</a>
                    <a href="/15sGames/SMBstarscramble/">Super Mario Star Scramble</a>
                    <a href="/15sGames/IWannaWin/">I Wanna Win</a>
                    <a href="/15sGames/BTD5/">Bloons TD 5</a>
                    <a href="/15sGames/Iwannabethatguy/">IWBTG</a>
                </div>
            </div>

            <!-- NEW 2 PLAYER LIST -->
            <div class="list-box lavender">
                <div class="list-title">2 Player</div>
                <div class="game-list">
                    <a href="#">Game 1</a>
                    <a href="#">Game 2</a>
                    <a href="#">Game 3</a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
