<!DOCTYPE html>
<html>
<head>
    <title>15's Game Library</title>
    <h4>Still ind development</h4>
    <style>
        body {
            background-color: #333;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            animation: colorChange 0.5s infinite;
            text-align: center;
            transform: translateY(20px);
            -webkit-text-stroke: 2px black;
            font-size: 50px;
        }

        @keyframes colorChange {
            0%   { color: red; }
            25%  { color: blue; }
            50%  { color: green; }
            75%  { color: orange; }
            100% { color: red; }
        }

        .parent {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* LIST BOX */
        .list-box-wrapper {
            text-align: center;
        }

        .list-box {
            background-color: red;
            padding: 20px;
            display: inline-block;
            border-radius: 10px;
            margin: 20px;
            text-align: left;
            width: 300px;
        }

        .list-title {
            font-weight: bold;
            color: black;
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .game-list a {
            display: block;
            text-decoration: none;
            color: white;
            margin: 5px 0;
            font-size: 16px;
        }

        .game-list a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>15's Game Library</h1>
    <hr style="margin-top: 50px;">

    <div class="parent">
        <button>Games</button>
        <button>Shows</button>
    </div>

    <hr>

    <div class="list-box-wrapper">
        <div class="list-box">
            <div class="list-title">15's Favorites</div>

            <div class="game-list">
                <a href="/15sGames/fvm/">Family Guy vs. American Dad</a>
                <a href="/15sGames/Farafalla/">Farafalla</a>
                <a href="/15sGames/PacXon/">Pac Xon</a>
            </div>
        </div>
    </div>

</body>
</html>
